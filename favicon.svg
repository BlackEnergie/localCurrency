<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#9B8BFF"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- flèche gauche→droite -->
  <line x1="5" y1="11" x2="22" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="18,7 22,11 18,15" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- flèche droite→gauche -->
  <line x1="27" y1="21" x2="10" y2="21" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="14,17 10,21 14,25" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
