<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#9B8BFF"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Flèche gauche (de gauche à droite, haut) -->
  <g stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="96" y1="186" x2="352" y2="186"/>
    <polyline points="296,140 352,186 296,232"/>
  </g>

  <!-- Flèche droite (de droite à gauche, bas) -->
  <g stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="416" y1="326" x2="160" y2="326"/>
    <polyline points="216,280 160,326 216,372"/>
  </g>

  <!-- Symboles $ et € -->
  <text x="108" y="390"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-size="100" font-weight="800"
    fill="white" fill-opacity="0.22"
    text-anchor="middle">$</text>
  <text x="404" y="240"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-size="100" font-weight="800"
    fill="white" fill-opacity="0.22"
    text-anchor="middle">€</text>
</svg>
